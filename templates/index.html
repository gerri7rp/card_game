<!DOCTYPE html>
<html>
<head>
    <title>Chat Rooms</title>
</head>
<body>

<h2>Create Room</h2>

<form method="POST">
    <input name="room" placeholder="Room name" required>
    <input name="password" type="password" placeholder="Password" required>

    <button name="action" value="create">
        Create Room
    </button>

    <button name="action" value="join">
        Join Room
    </button>
</form>

</body>
</html>
