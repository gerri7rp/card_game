<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gissa - Lobby</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .lobby-container {
            background: linear-gradient(135deg, #0d5f4f 0%, #1a8659 100%);
            border-radius: 20px;
            padding: 60px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            max-width: 600px;
            width: 100%;
            border: 3px solid #d4af37;
            text-align: center;
        }

        .lobby-header {
            margin-bottom: 50px;
        }

        .lobby-title {
            font-size: 3.5em;
            color: #d4af37;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            font-weight: bold;
            letter-spacing: 2px;
        }

        .card-icon {
            font-size: 4em;
            margin-bottom: 20px;
            display: block;
            text-align: center;
        }

        .lobby-subtitle {
            color: #ffffff;
            font-size: 1.3em;
            margin-bottom: 40px;
            opacity: 0.9;
        }

        .action-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 40px;
        }

        .action-btn {
            background: linear-gradient(135deg, #d4af37, #b8941f);
            color: #000;
            border: none;
            padding: 18px 40px;
            font-size: 1.2em;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 12px rgba(212, 175, 55, 0.3);
            flex: 1;
            max-width: 250px;
        }

        .action-btn:hover:not(:disabled) {
            background: linear-gradient(135deg, #f0c850, #d4af37);
            transform: translateY(-3px);
            box-shadow: 0 6px 16px rgba(212, 175, 55, 0.5);
        }

        .action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .form-container {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 30px;
            margin-top: 30px;
            border: 2px solid rgba(212, 175, 55, 0.5);
            display: none;
        }

        .form-title {
            color: #d4af37;
            font-size: 1.8em;
            margin-bottom: 25px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-input {
            width: 100%;
            padding: 15px;
            font-size: 1.1em;
            border: 2px solid #d4af37;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            transition: all 0.3s;
        }

        .form-input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .form-input:focus {
            outline: none;
            border-color: #f0c850;
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
        }

        .form-select {
            width: 100%;
            padding: 15px;
            font-size: 1.1em;
            border: 2px solid #d4af37;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
        }

        .form-select option {
            background: #1a8659;
            color: #fff;
        }

        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, #00ff00, #00aa00);
            color: #fff;
            border: none;
            padding: 18px;
            font-size: 1.2em;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 12px rgba(0, 255, 0, 0.3);
            margin-top: 10px;
        }

        .submit-btn:hover {
            background: linear-gradient(135deg, #00ff44, #00cc00);
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(0, 255, 0, 0.5);
        }

        .rooms-info {
            color: #d4af37;
            font-size: 1.1em;
            margin-top: 20px;
            opacity: 0.8;
        }

        @media (max-width: 768px) {
            .lobby-container {
                padding: 40px 20px;
            }

            .lobby-title {
                font-size: 2.5em;
            }

            .action-buttons {
                flex-direction: column;
                align-items: center;
            }

            .action-btn {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="lobby-container">
        <div class="lobby-header">
            <span class="card-icon">??</span>
            <h1 class="lobby-title">GISSA</h1>
            <p class="lobby-subtitle">Challenge your friends in this strategic card game</p>
        </div>

        <div class="action-buttons">
            <button class="action-btn" onclick="showCreate()">Create Room</button>
            <button class="action-btn" onclick="showJoin()">Join Room</button>
        </div>

        <div id="createForm" class="form-container">
            <h2 class="form-title">Create Room</h2>
            <form method="POST">
                <input type="hidden" name="action" value="create">
                <div class="form-group">
                    <input type="text" name="username" class="form-input" placeholder="Your username" required>
                </div>
                <div class="form-group">
                    <input type="text" name="room" class="form-input" placeholder="Room name" required>
                </div>
                <div class="form-group">
                    <select name="cards_per_round" class="form-select" required>
                        <option value="">Select number of cards</option>
                        <option value="1">1 card</option>
                        <option value="2">2 cards</option>
                        <option value="3">3 cards</option>
                        <option value="4">4 cards</option>
                        <option value="5">5 cards</option>
                        <option value="6">6 cards</option>
                        <option value="7">7 cards</option>
                        <option value="8">8 cards</option>
                        <option value="9">9 cards</option>
                        <option value="10">10 cards</option>
                    </select>
                </div>
                <button type="submit" class="submit-btn">Create Room</button>
            </form>
        </div>

        <div id="joinForm" class="form-container">
            <h2 class="form-title">Join Room</h2>
            <form method="POST">
                <input type="hidden" name="action" value="join">
                <div class="form-group">
                    <input type="text" name="username" class="form-input" placeholder="Your username" required>
                </div>
                <div class="form-group">
                    <select name="room" class="form-select" required>
                        <option value="">Select a room</option>
                        {% for room in rooms %}
                            <option value="{{ room }}">{{ room }}</option>
                        {% endfor %}
                    </select>
                </div>
                <button type="submit" class="submit-btn">Join Room</button>
            </form>
        </div>

        {% if rooms %}
            <div class="rooms-info">
                {{ rooms|length }} room{% if rooms|length > 1 %}s{% endif %} available
            </div>
        {% endif %}
    </div>

    <script>
        function showCreate() {
            document.getElementById('createForm').style.display = 'block';
            document.getElementById('joinForm').style.display = 'none';
        }
        
        function showJoin() {
            document.getElementById('createForm').style.display = 'none';
            document.getElementById('joinForm').style.display = 'block';
        }
    </script>
</body>
</html>
