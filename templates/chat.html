<!DOCTYPE html>
<html>
<head>
    <title>Chat Room</title>
    <script src="https://cdn.socket.io/4.0.1/socket.io.min.js"></script>
</head>
<body>

<h2>Room: {{ room }}</h2>
<h3>User: {{ username }}</h3>

<div id="chat-box" style="height:300px; overflow:auto; border:1px solid black;"></div>

<input id="message" placeholder="Write message...">
<button onclick="sendMessage()">Send</button>

<script>
var socket = io();

// Unirse a la sala pasando datos directamente
socket.emit("join", {username: "{{ username }}", room: "{{ room }}"});

// Recibir mensajes
socket.on("message", function(msg){
    var box = document.getElementById("chat-box");
    var p = document.createElement("p");
    p.innerText = msg;
    box.appendChild(p);
});

// Enviar mensaje
function sendMessage(){
    var input = document.getElementById("message");
    if(input.value.trim() === "") return;
    socket.emit("message", {username: "{{ username }}", room: "{{ room }}", msg: input.value});
    input.value = "";
}
</script>

</body>
</html>
